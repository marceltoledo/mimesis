name: DEV Rollout

# Orchestrator: full DEV deployment chain.
# Stages run in dependency order; BC-01 and BC-02 deploys run in PARALLEL
# after Terraform completes.
#
# Job dependency graph:
#   terraform-dev
#       ├── deploy-bc01-dev ──► smoke-bc01-dev
#       └── deploy-bc02-dev ──► smoke-bc02-dev
#                                    ├── smoke-sb-send
#                                    └── smoke-blob-poll (needs: smoke-sb-send)
on:
  workflow_dispatch:

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. Terraform: provision / update DEV infrastructure ─────────────────────
  terraform-dev:
    uses: ./.github/workflows/_tf-apply.yml
    with:
      env: "dev"
      resource_group: "mimesis-dev-rg"
    secrets: inherit

  # ── 2a. Deploy BC-01 (runs in parallel with BC-02 after Terraform) ───────────
  deploy-bc01-dev:
    needs: terraform-dev
    uses: ./.github/workflows/_deploy-bc.yml
    with:
      env: "dev"
      bc_id: "BC-01"
      source_dir: "functions/video-discovery"
      deploy_container: "fn-fd-deploy"
      resource_group: "mimesis-dev-rg"
    secrets: inherit

  # ── 2b. Deploy BC-02 (runs in parallel with BC-01 after Terraform) ───────────
  deploy-bc02-dev:
    needs: terraform-dev
    uses: ./.github/workflows/_deploy-bc.yml
    with:
      env: "dev"
      bc_id: "BC-02"
      source_dir: "functions/video-ingestion"
      deploy_container: "fn-fi-deploy"
      resource_group: "mimesis-dev-rg"
    secrets: inherit

  # ── 3a. Smoke BC-01 (runs after BC-01 deploy; independent of BC-02 smoke) ───
  smoke-bc01-dev:
    needs: deploy-bc01-dev
    uses: ./.github/workflows/_smoke-bc01.yml
    with:
      env: "dev"
      resource_group: "mimesis-dev-rg"
    secrets: inherit

  # ── 3b. Smoke BC-02 (runs after BC-02 deploy; independent of BC-01 smoke) ───
  smoke-bc02-dev:
    needs: deploy-bc02-dev
    uses: ./.github/workflows/_smoke-bc02.yml
    with:
      env: "dev"
      resource_group: "mimesis-dev-rg"
    secrets: inherit
