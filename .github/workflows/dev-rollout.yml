name: DEV Rollout

on:
  workflow_dispatch:

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: infrastructure/terraform
  # Deterministic DEV resource group derived from Terraform locals:
  # prefix = "mimesis-dev", rg = "mimesis-dev-rg"
  RESOURCE_GROUP: mimesis-dev-rg

jobs:
  # ── 1. Terraform: provision / update DEV infrastructure ─────────────────────
  terraform-dev:
    name: Terraform DEV (init → plan → apply)
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight required Azure inputs
        run: |
          missing=0
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!var}" ]; then
              echo "Missing required value: $var (set as repository secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_youtube_api_key: ${{ secrets.AZURE_YOUTUBE_API_KEY }}
        run: |
          terraform plan \
            -var-file=dev.tfvars \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_youtube_api_key: ${{ secrets.AZURE_YOUTUBE_API_KEY }}
        run: terraform apply -auto-approve tfplan

  # ── 2. Deploy Function Apps ──────────────────────────────────────────────────
  deploy-functions-dev:
    name: Deploy Function Apps DEV
    runs-on: ubuntu-latest
    needs: terraform-dev
    environment: dev
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_BC01_FUNCTION_APP_NAME: ${{ secrets.AZURE_BC01_FUNCTION_APP_NAME }}
      AZURE_BC02_FUNCTION_APP_NAME: ${{ secrets.AZURE_BC02_FUNCTION_APP_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Preflight required deploy inputs
        run: |
          missing=0
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_BC01_FUNCTION_APP_NAME AZURE_BC02_FUNCTION_APP_NAME; do
            if [ -z "${!var}" ]; then
              echo "Missing required value: $var (set as repository secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pre-install all package dependencies so the ZIP contains everything the
      # Azure Functions runtime needs without a remote build step.
      - name: Install package dependencies for deployment
        run: |
          pip install \
            --target=".python_packages/lib/site-packages" \
            --upgrade \
            .

      # BC-01: Video Discovery
      # Packages functions/video-discovery/ (includes host.json) with all deps.
      - name: Package BC-01 (Video Discovery)
        run: |
          mkdir -p staging-bc01
          cp -r functions/video-discovery/. staging-bc01/
          cp -r .python_packages staging-bc01/
          cd staging-bc01
          zip -r ../deploy-bc01.zip . \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*"

      - name: Deploy BC-01 (Video Discovery)
        run: |
          az functionapp deploy \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_BC01_FUNCTION_APP_NAME }}" \
            --src-path deploy-bc01.zip \
            --type zip \
            --async true

      # BC-02: Video Ingestion
      # Packages functions/video-ingestion/ (includes host.json) with all deps.
      - name: Package BC-02 (Video Ingestion)
        run: |
          mkdir -p staging-bc02
          cp -r functions/video-ingestion/. staging-bc02/
          cp -r .python_packages staging-bc02/
          cd staging-bc02
          zip -r ../deploy-bc02.zip . \
            --exclude "*.pyc" \
            --exclude "*/__pycache__/*"

      - name: Deploy BC-02 (Video Ingestion)
        run: |
          az functionapp deploy \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_BC02_FUNCTION_APP_NAME }}" \
            --src-path deploy-bc02.zip \
            --type zip \
            --async true

  # ── 3. Smoke test: verify BC-01 HTTP endpoint is reachable ──────────────────
  smoke-dev:
    name: Smoke Test DEV (BC-01)
    runs-on: ubuntu-latest
    needs: deploy-functions-dev
    environment: dev
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_BC01_FUNCTION_URL: ${{ secrets.AZURE_BC01_FUNCTION_URL }}
      AZURE_BC01_FUNCTION_KEY: ${{ secrets.AZURE_BC01_FUNCTION_KEY }}

    steps:
      - name: Preflight required smoke inputs
        run: |
          missing=0
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_BC01_FUNCTION_URL AZURE_BC01_FUNCTION_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required value: $var (set as repository secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test BC-01 endpoint
        run: |
          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-functions-key: ${{ env.AZURE_BC01_FUNCTION_KEY }}" \
            "${{ env.AZURE_BC01_FUNCTION_URL }}")
          echo "HTTP status: $http_status"
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Smoke test FAILED — HTTP $http_status returned by BC-01 endpoint."
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $http_status"
