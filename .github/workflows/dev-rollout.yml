name: DEV Rollout

on:
  workflow_dispatch:

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. Terraform: provision / update DEV infrastructure ─────────────────────
  terraform-dev:
    name: Terraform DEV
    uses: ./.github/workflows/_tf-apply.yml
    with:
      env: dev
      resource_group: mimesis-dev-rg
    secrets: inherit

  # ── 2. Deploy BC-01 and BC-02 in parallel after Terraform ───────────────────
  deploy-bc01-dev:
    name: Deploy BC-01 DEV
    needs: terraform-dev
    uses: ./.github/workflows/_deploy-bc.yml
    with:
      env: dev
      bc_id: BC-01
      source_dir: functions/video-discovery
      deploy_container: fn-fd-deploy
      resource_group: mimesis-dev-rg
      function_app_name: ${{ secrets.AZURE_BC01_FUNCTION_APP_NAME }}
    secrets: inherit

  deploy-bc02-dev:
    name: Deploy BC-02 DEV
    needs: terraform-dev
    uses: ./.github/workflows/_deploy-bc.yml
    with:
      env: dev
      bc_id: BC-02
      source_dir: functions/video-ingestion
      deploy_container: fn-fi-deploy
      resource_group: mimesis-dev-rg
      function_app_name: ${{ secrets.AZURE_BC02_FUNCTION_APP_NAME }}
    secrets: inherit

  # ── 3. Smoke tests run independently after their respective deploy ───────────
  smoke-bc01-dev:
    name: Smoke BC-01 DEV
    needs: deploy-bc01-dev
    uses: ./.github/workflows/_smoke-bc01.yml
    with:
      env: dev
      resource_group: mimesis-dev-rg
    secrets: inherit

  smoke-bc02-dev:
    name: Smoke BC-02 DEV
    needs: deploy-bc02-dev
    uses: ./.github/workflows/_smoke-bc02.yml
    with:
      env: dev
      resource_group: mimesis-dev-rg
    secrets: inherit
