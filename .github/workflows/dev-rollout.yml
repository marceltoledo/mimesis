name: DEV Rollout

on:
  workflow_dispatch:

jobs:
  terraform-dev:
    name: Terraform DEV apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform plan (dev)
        run: terraform plan -var-file=dev.tfvars -var-file=dev.secrets.tfvars -out=tfplan

      - name: Terraform apply (dev)
        run: terraform apply -auto-approve tfplan

  deploy-functions-dev:
    name: Deploy function apps
    runs-on: ubuntu-latest
    needs: terraform-dev
    permissions:
      id-token: write
      contents: read
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build BC-01 package
        run: |
          python -m pip install --upgrade pip
          rm -rf .package/bc01
          mkdir -p .package/bc01/.python_packages/lib/site-packages
          python -m pip install . --target .package/bc01/.python_packages/lib/site-packages
          cp -r functions/video-discovery/* .package/bc01/

      - name: Build BC-02 package
        run: |
          rm -rf .package/bc02
          mkdir -p .package/bc02/.python_packages/lib/site-packages
          python -m pip install . --target .package/bc02/.python_packages/lib/site-packages
          cp -r functions/video-ingestion/* .package/bc02/

      - name: Deploy BC-01
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_BC01_FUNCTION_APP_NAME }}
          package: .package/bc01

      - name: Deploy BC-02
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_BC02_FUNCTION_APP_NAME }}
          package: .package/bc02

  smoke-dev:
    name: Post-deploy smoke checks
    runs-on: ubuntu-latest
    needs: deploy-functions-dev
    steps:
      - name: BC-01 smoke request
        run: |
          curl -sS -X POST "${{ secrets.AZURE_BC01_FUNCTION_URL }}?code=${{ secrets.AZURE_BC01_FUNCTION_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"keyword":"storytelling","max_results":1}'
