name: TF Apply (reusable)

# Reusable workflow: Terraform init → plan → apply for a given environment.
# Called by orchestrator workflows (e.g. dev-rollout.yml).
on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
        description: "Target environment: dev or prod"
      resource_group:
        required: true
        type: string
        description: "Azure resource group name (e.g. mimesis-dev-rg)"

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

jobs:
  tf-apply:
    name: Terraform ${{ inputs.env }} (init → plan → apply)
    runs-on: ubuntu-latest
    # Environment protection rules (required reviewers, etc.) apply here.
    environment: ${{ inputs.env }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # ARM_ vars are consumed by the Terraform AzureRM provider for OIDC auth.
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Preflight required Azure inputs
        working-directory: ${{ github.workspace }}
        run: |
          missing=0
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!var}" ]; then
              echo "Missing required value: $var (set as repository secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      # init uses committed .terraform.lock.hcl — do NOT use -upgrade in CI.
      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        env:
          TF_VAR_youtube_api_key: ${{ secrets.AZURE_YOUTUBE_API_KEY }}
        run: |
          terraform plan \
            -var-file=${{ inputs.env }}.tfvars \
            -out=tfplan

      - name: Terraform Apply
        env:
          TF_VAR_youtube_api_key: ${{ secrets.AZURE_YOUTUBE_API_KEY }}
        run: terraform apply -auto-approve tfplan
