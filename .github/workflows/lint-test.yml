name: Lint and Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "infrastructure/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "infrastructure/**"
      - "**.md"

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Type-check with mypy
        run: mypy src/

      # Unit tests only — integration tests require live Azure resources
      - name: Run unit tests
        run: pytest -m "not integration" --cov=src/mimesis --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true  # Do not block CI on coverage upload failures
