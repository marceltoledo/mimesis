name: DEV Smoke Test Only

on:
  workflow_dispatch:

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

jobs:
  # ── Smoke test: verify BC-01 HTTP endpoint is reachable ─────────────────────
  smoke-dev:
    name: Smoke Test DEV (BC-01)
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test BC-01 endpoint
        run: |
          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-functions-key: ${{ secrets.AZURE_BC01_FUNCTION_KEY }}" \
            "${{ secrets.AZURE_BC01_FUNCTION_URL }}")
          echo "HTTP status: $http_status"
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Smoke test FAILED — HTTP $http_status returned by BC-01 endpoint."
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $http_status"
