name: DEV Smoke Test Only

on:
  workflow_dispatch:

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

jobs:
  # ── Smoke test: verify BC-01 HTTP endpoint and BC-02 function app ───────────
  smoke-dev:
    name: Smoke Test DEV (BC-01 + BC-02)
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_BC01_FUNCTION_URL: ${{ secrets.AZURE_BC01_FUNCTION_URL }}
      AZURE_BC01_FUNCTION_KEY: ${{ secrets.AZURE_BC01_FUNCTION_KEY }}
      AZURE_BC02_FUNCTION_APP_NAME: ${{ secrets.AZURE_BC02_FUNCTION_APP_NAME }}
      RESOURCE_GROUP: mimesis-dev-rg

    steps:
      - name: Preflight required smoke inputs
        run: |
          missing=0
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_BC01_FUNCTION_URL AZURE_BC01_FUNCTION_KEY AZURE_BC02_FUNCTION_APP_NAME; do
            if [ -z "${!var}" ]; then
              echo "Missing required value: $var (set as repository secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test BC-01 endpoint
        run: |
          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-functions-key: ${{ env.AZURE_BC01_FUNCTION_KEY }}" \
            "${{ env.AZURE_BC01_FUNCTION_URL }}")
          echo "HTTP status: $http_status"
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Smoke test FAILED — HTTP $http_status returned by BC-01 endpoint."
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $http_status"

      - name: Smoke test BC-02 function app (health)
        run: |
          APP="${{ env.AZURE_BC02_FUNCTION_APP_NAME }}"
          RG="${{ env.RESOURCE_GROUP }}"
          SUB="${{ env.AZURE_SUBSCRIPTION_ID }}"
          # Use az rest with the same API version (2024-04-01) that Terraform uses
          # to provision FC1 Flex Consumption function apps. The generic
          # `az functionapp show` uses an older CLI-managed API version that may
          # not return the `state` field for FC1 apps.
          # Retry up to 5 times (30s total) to handle brief transitional states.
          state=""
          for attempt in $(seq 1 5); do
            raw=$(az rest \
              --method GET \
              --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}?api-version=2024-04-01" \
              2>&1) && rc=0 || rc=$?
            if [ $rc -ne 0 ]; then
              echo "Attempt $attempt/5: az rest failed (exit $rc): $raw"
            else
              state=$(echo "$raw" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('properties',{}).get('state',''))" 2>/dev/null || echo "")
              echo "Attempt $attempt/5: BC-02 function app state: ${state:-<unknown>}"
              if [ "${state}" = "Running" ]; then
                break
              fi
            fi
            [ $attempt -lt 5 ] && sleep 10
          done
          if [ "${state}" != "Running" ]; then
            echo "Smoke test FAILED — BC-02 function app is not in Running state after retries (state=${state:-<unknown>})."
            exit 1
          fi
          echo "Smoke test PASSED — BC-02 function app is Running."
