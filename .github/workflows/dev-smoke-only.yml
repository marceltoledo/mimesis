name: DEV Smoke Test Only

on:
  workflow_dispatch:

# OIDC token required for azure/login federated credential auth.
# contents:read required to check out the repository.
permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: cd0f8931-941e-4a3c-8ede-6b51d0e88375
  AZURE_TENANT_ID: 537312d2-c122-4075-ada6-72ac5582edc1
  AZURE_SUBSCRIPTION_ID: 4bd495aa-ee07-4b54-a678-86d545b31c24
  AZURE_BC01_FUNCTION_URL: ${{ secrets.AZURE_BC01_FUNCTION_URL || vars.AZURE_BC01_FUNCTION_URL }}
  AZURE_BC01_FUNCTION_KEY: ${{ secrets.AZURE_BC01_FUNCTION_KEY || vars.AZURE_BC01_FUNCTION_KEY }}

jobs:
  # ── Smoke test: verify BC-01 HTTP endpoint is reachable ─────────────────────
  smoke-dev:
    name: Smoke Test DEV (BC-01)
    runs-on: ubuntu-latest

    steps:
      - name: Preflight required smoke inputs
        run: |
          missing=0
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_BC01_FUNCTION_URL AZURE_BC01_FUNCTION_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required value: $var (set as repository secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke test BC-01 endpoint
        run: |
          http_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-functions-key: ${{ env.AZURE_BC01_FUNCTION_KEY }}" \
            "${{ env.AZURE_BC01_FUNCTION_URL }}")
          echo "HTTP status: $http_status"
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Smoke test FAILED — HTTP $http_status returned by BC-01 endpoint."
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $http_status"
